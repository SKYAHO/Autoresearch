data:
  path: data/processed/training_dataset.csv
  test_size: 0.2
  val_size: 0.2
  random_state: 42
  feature_columns:
    - age_group
    - occupation
    - historical_category_affinity
    - recent_click_count_7d
    - recent_watch_time_7d
    - recent_like_count_7d
    - category_id
    - duration_sec
    - view_count
    - like_ratio
    - comment_ratio
    - days_since_upload
    - historical_category_match
    - preferred_category_match
    - topic_similarity
  categorical_columns:
    - age_group
    - occupation
    - historical_category_affinity
    - category_id

model:
  n_estimators: 200
  learning_rate: 0.05
  num_leaves: 31
  scale_pos_weight: auto
  random_state: 42

artifacts:
  model_path: artifacts/models/lgbm_model.joblib
  feature_columns_path: artifacts/models/feature_columns.pkl
  categorical_columns_path: artifacts/models/categorical_columns.pkl
  test_set_path: data/processed/test_set.csv

registry:
  model_name: ctr-model
