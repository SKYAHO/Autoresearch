data:
  path: data/processed/training_dataset.csv
  test_size: 0.2
  val_size: 0.2
  random_state: 42

model:
  n_estimators: 200
  learning_rate: 0.05
  num_leaves: 31
  scale_pos_weight: auto
  random_state: 42
  # negative downsampling 비율 = negative를 남긴 비율(0<w≤1). 1.0이면 off(#300).
  # 0.1 = negative의 10%만 남김. sampling_rate < 1.0이면 scale_pos_weight는
  # 자동으로 1로 강제되고(이중 보정 방지), 출력 확률은 He 2014 보정으로 원분포
  # 복원된다. 설계: docs/specs/2026-07-24-negative-downsampling-calibration.md
  sampling_rate: 1.0

artifacts:
  model_path: artifacts/models/lgbm_model.joblib
  feature_columns_path: artifacts/models/feature_columns.pkl
  categorical_columns_path: artifacts/models/categorical_columns.pkl
  test_set_path: data/processed/test_set.csv

registry:
  model_name: ctr-model
