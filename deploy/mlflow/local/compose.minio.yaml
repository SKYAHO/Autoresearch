services:
  minio:
    image: minio/minio:RELEASE.2025-01-22T17-11-35Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio-user}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  minio-init:
    image: minio/mc:RELEASE.2025-01-22T17-11-35Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio http://minio:9000 ${MINIO_ROOT_USER:-minio-user} ${MINIO_ROOT_PASSWORD:-minio-password} &&
      /usr/bin/mc mb minio/mlflow-artifacts --ignore-existing &&
      echo 'Bucket mlflow-artifacts created/exists'
      "
    networks:
      - default

  mlflow:
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio-user}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio-password}
    command: >
      sh -c "pip install -q psycopg2-binary==2.9.10 &&
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow_local_password}@postgres:5432/${POSTGRES_DB:-mlflow}
        --serve-artifacts
        --artifacts-destination s3://mlflow-artifacts"
    depends_on:
      minio-init:
        condition: service_completed_successfully

volumes:
  minio-data:

networks:
  default:
    name: mlflow-network
