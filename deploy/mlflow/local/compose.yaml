services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    volumes:
      - mlflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://localhost:5000}
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlartifacts
    command: >
      sh -c "pip install -q psycopg2-binary==2.9.10 &&
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow_local_password}@postgres:5432/${POSTGRES_DB:-mlflow}
        --artifacts-destination /mlartifacts"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 5000), timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mlflow_postgres_data:
    name: mlflow_postgres_data
  mlflow_artifacts:
    name: mlflow_artifacts
