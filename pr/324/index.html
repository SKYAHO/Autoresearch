<head>

<style>

  :root {
    --bg: #f6f8fa; --surface: #ffffff; --border: #d1d9e0;
    --text: #1f2328; --muted: #59636e; --accent: #0969da;
    --unchanged-fill: #f6f8fa; --unchanged-stroke: #d1d9e0; --unchanged-text: #59636e;
    --modified-fill: #ddf4ff; --modified-stroke: #0969da; --modified-text: #0550ae;
    --added-fill: #dafbe1;    --added-stroke: #1a7f37;    --added-text: #116329;
    --removed-fill: #ffebe9;  --removed-stroke: #cf222e;  --removed-text: #a40e26;
    --diff-add-bg: #dafbe1; --diff-del-bg: #ffebe9; --diff-hunk-bg: #ddf4ff;
    --risk-bg: #fff8c5; --risk-border: #d4a72c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8d96a0; --accent: #4493f8;
      --unchanged-fill: #161b22; --unchanged-stroke: #30363d; --unchanged-text: #8d96a0;
      --modified-fill: #0c2d6b; --modified-stroke: #4493f8; --modified-text: #79c0ff;
      --added-fill: #04260f;    --added-stroke: #2ea043;    --added-text: #56d364;
      --removed-fill: #3c0614;  --removed-stroke: #f85149;  --removed-text: #ff7b72;
      --diff-add-bg: rgba(46,160,67,.22); --diff-del-bg: rgba(248,81,73,.22); --diff-hunk-bg: rgba(68,147,248,.18);
      --risk-bg: #2b2205; --risk-border: #9e6a03;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                 "Noto Sans KR", "Malgun Gothic", sans-serif;
    line-height: 1.6;
  }
  main { max-width: 980px; margin: 0 auto; padding: 24px 16px 64px; }
  header.page {
    border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 24px;
  }
  header.page h1 { font-size: 1.35rem; margin: 0 0 6px; }
  header.page .meta { color: var(--muted); font-size: .85rem; }
  header.page .meta a { color: var(--accent); text-decoration: none; }
  section { margin-bottom: 32px; }
  section > h2 {
    font-size: 1.05rem; margin: 0 0 12px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  section > h2 .step {
    display: inline-block; background: var(--accent); color: #fff;
    border-radius: 999px; font-size: .72rem; padding: 1px 9px;
    vertical-align: 2px; margin-right: 7px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  #summary ol { margin: 0; padding-left: 22px; }
  #summary li { margin: 4px 0; }
  /* 파이프라인 SVG */
  #pipeline-wrap { overflow-x: auto; }
  #pipeline-svg { display: block; min-width: 760px; width: 100%; height: auto; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: .8rem; color: var(--muted); margin-top: 8px; }
  .legend span[class^="lg-"]::before {
    content: ""; display: inline-block; width: 12px; height: 12px; border-radius: 3px;
    margin-right: 5px; vertical-align: -1px; border: 1.5px solid;
  }
  .legend .lg-unchanged::before { background: var(--unchanged-fill); border-color: var(--unchanged-stroke); }
  .legend .lg-modified::before  { background: var(--modified-fill);  border-color: var(--modified-stroke); }
  .legend .lg-added::before     { background: var(--added-fill);     border-color: var(--added-stroke); }
  .legend .lg-removed::before   { background: var(--removed-fill);   border-color: var(--removed-stroke); }

  svg .node.st-modified rect  { fill: var(--modified-fill);  stroke: var(--modified-stroke); }
  svg .node.st-added rect     { fill: var(--added-fill);     stroke: var(--added-stroke); }
  svg .node.st-removed rect   { fill: var(--removed-fill);   stroke: var(--removed-stroke); }
  svg .node.focus rect { stroke-width: 3; }
  svg .node.clickable rect { cursor: pointer; }
  svg .node text { font-size: 12px; fill: var(--text); pointer-events: none; }
  svg .node.st-unchanged text { fill: var(--unchanged-text); }
  svg .lane-label { font-size: 11px; fill: var(--muted); }
  svg .edge { fill: none; stroke: var(--border); stroke-width: 1.5; }
  svg .edge.dashed { stroke-dasharray: 5 4; }
  svg .edge.st-modified { stroke: var(--modified-stroke); }
  svg .edge.st-added { stroke: var(--added-stroke); }
  svg .edge.st-removed { stroke: var(--removed-stroke); }
  #node-detail { margin-top: 12px; display: none; }
  #node-detail.visible { display: block; }
  #node-detail h3 { margin: 0 0 8px; font-size: .95rem; }
  #node-detail .asis-tobe { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 640px) { #node-detail .asis-tobe { grid-template-columns: 1fr; } }
  #node-detail .asis-tobe > div {
    border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: .87rem;
  }

  #node-detail .paths { color: var(--muted); font-size: .78rem; margin-top: 8px; font-family: ui-monospace, monospace; }
  /* 왜/기대효과 */
  #why .effects { margin: 10px 0 0; padding-left: 22px; }

  .badge {

    border: 1px solid; text-transform: uppercase; letter-spacing: .03em;

  .badge.core     { background: var(--removed-fill);  border-color: var(--removed-stroke);  color: var(--removed-text); }
  .badge.contract { background: var(--modified-fill); border-color: var(--modified-stroke); color: var(--modified-text); }
  .badge.config   { background: var(--risk-bg);       border-color: var(--risk-border);     color: var(--text); }
  .badge.test     { background: var(--added-fill);    border-color: var(--added-stroke);    color: var(--added-text); }
  .badge.docs     { background: var(--unchanged-fill); border-color: var(--unchanged-stroke); color: var(--unchanged-text); }
  .change-head .symbol { font-weight: 600; font-family: ui-monospace, monospace; font-size: .92rem; }
  .change-head .file { color: var(--muted); font-size: .8rem; font-family: ui-monospace, monospace; }
  .change-card p.expl { margin: 8px 0 0; font-size: .92rem; }
  .risk {
    background: var(--risk-bg); border: 1px solid var(--risk-border);
    border-radius: 6px; padding: 8px 12px; margin-top: 8px; font-size: .85rem;
  }
  .risk::before { content: "⚠ 리스크: "; font-weight: 700; }
  details.diff-box { margin-top: 10px; }
  details.diff-box summary { cursor: pointer; font-size: .85rem; color: var(--accent); user-select: none; }
  pre.diff {
    margin: 8px 0 0; border: 1px solid var(--border); border-radius: 6px;
    overflow-x: auto; font-size: .8rem; line-height: 1.5; padding: 0;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  }
  pre.diff .ln { display: block; padding: 0 12px; white-space: pre; }
  pre.diff .ln.add { background: var(--diff-add-bg); }
  pre.diff .ln.del { background: var(--diff-del-bg); }
  pre.diff .ln.hunk { background: var(--diff-hunk-bg); color: var(--muted); }
  /* QA */
  #qa .card { border-left: 4px solid var(--accent); }
  footer { color: var(--muted); font-size: .78rem; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 12px; }
</style>
</head>

</main>

  // ---------- header ----------
  document.title = "PR #" + r.pr.number + " 이해 리포트";
  document.getElementById("pr-title").textContent = "PR #" + r.pr.number + " — " + r.pr.title;
  var meta = document.getElementById("pr-meta");
  var metaParts = ["작성자 @" + r.pr.author, "생성 " + r.pr.generated_at, "head " + r.pr.head_sha.slice(0, 8)];
  if (r.pr.issue_refs && r.pr.issue_refs.length) {
    metaParts.push("관련 이슈 " + r.pr.issue_refs.map(function (n) { return "#" + n; }).join(", "));
  }
  meta.textContent = metaParts.join(" · ");

  // ---------- summary ----------
  var ol = document.getElementById("summary-list");
  r.summary_ko.forEach(function (line) {
    var li = document.createElement("li");
    li.textContent = line;
    ol.appendChild(li);
  });

  // ---------- pipeline SVG (결정적 그리드 배치: lane = 행, order = 행 내 위치) ----------
  var LANES = ["batch", "data", "train", "serve", "cross", "external"];
  var LANE_LABELS = { batch: "배치 수집·생성", data: "데이터 계층", train: "학습", serve: "서빙·시뮬레이션", cross: "공통·계약", external: "외부 저장소" };
  var NW = 172, NH = 46, GX = 40, GY = 34, LABEL_W = 110, PAD = 16;
  var svgNS = "http://www.w3.org/2000/svg";
  var svg = document.getElementById("pipeline-svg");

  var nodes = r.pipeline.nodes.slice();
  var byId = {};
  var maxOrder = 1;
  nodes.forEach(function (n) { byId[n.id] = n; if (n.order > maxOrder) maxOrder = n.order; });
  var usedLanes = LANES.filter(function (l) { return nodes.some(function (n) { return n.lane === l; }); });

  function pos(n) {
    var laneIdx = usedLanes.indexOf(n.lane);
    return {
      x: PAD + LABEL_W + (n.order - 1) * (NW + GX),
      y: PAD + laneIdx * (NH + GY)
    };
  }
  var W = PAD * 2 + LABEL_W + maxOrder * (NW + GX) - GX;
  var H = PAD * 2 + usedLanes.length * (NH + GY) - GY;
  svg.setAttribute("viewBox", "0 0 " + W + " " + H);

  // 화살표 marker
  var defs = document.createElementNS(svgNS, "defs");
  ["", "modified", "added", "removed"].forEach(function (st) {
    var m = document.createElementNS(svgNS, "marker");
    m.setAttribute("id", "arrow" + (st ? "-" + st : ""));
    m.setAttribute("viewBox", "0 0 10 10");
    m.setAttribute("refX", "9"); m.setAttribute("refY", "5");
    m.setAttribute("markerWidth", "7"); m.setAttribute("markerHeight", "7");
    m.setAttribute("orient", "auto-start-reverse");
    var p = document.createElementNS(svgNS, "path");
    p.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
    p.setAttribute("fill", st === "modified" ? "var(--modified-stroke)"
      : st === "added" ? "var(--added-stroke)"
      : st === "removed" ? "var(--removed-stroke)" : "var(--border)");
    m.appendChild(p);
    defs.appendChild(m);
  });
  svg.appendChild(defs);

  // lane 라벨
  usedLanes.forEach(function (lane, i) {
    var t = document.createElementNS(svgNS, "text");
    t.setAttribute("class", "lane-label");
    t.setAttribute("x", PAD);
    t.setAttribute("y", PAD + i * (NH + GY) + NH / 2 + 4);
    t.textContent = LANE_LABELS[lane] || lane;
    svg.appendChild(t);
  });

  // 에지 (노드보다 먼저 그려서 아래 깔리게)
  (r.pipeline.edges || []).forEach(function (e) {
    var a = byId[e.from], b = byId[e.to];
    if (!a || !b) return;
    var pa = pos(a), pb = pos(b);
    var x1, y1, x2, y2;
    if (a.lane === b.lane) { // 같은 행: 오른쪽 → 왼쪽
      x1 = pa.x + NW; y1 = pa.y + NH / 2; x2 = pb.x; y2 = pb.y + NH / 2;
    } else {               // 다른 행: 아래/위 가장자리 중앙끼리
      var down = pb.y > pa.y;
      x1 = pa.x + NW / 2; y1 = down ? pa.y + NH : pa.y;
      x2 = pb.x + NW / 2; y2 = down ? pb.y : pb.y + NH;
    }
    var path = document.createElementNS(svgNS, "path");
    var mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    path.setAttribute("d", a.lane === b.lane
      ? "M " + x1 + " " + y1 + " L " + x2 + " " + y2
      : "M " + x1 + " " + y1 + " C " + x1 + " " + my + ", " + x2 + " " + my + ", " + x2 + " " + y2);
    var cls = "edge";
    if (e.style === "dashed") cls += " dashed";
    if (e.status && e.status !== "unchanged") cls += " st-" + e.status;
    path.setAttribute("class", cls);
    path.setAttribute("marker-end", "url(#arrow" + (e.status && e.status !== "unchanged" ? "-" + e.status : "") + ")");
    svg.appendChild(path);
  });

  // 노드
  var detail = document.getElementById("node-detail");
  nodes.forEach(function (n) {
    var p = pos(n);
    var g = document.createElementNS(svgNS, "g");
    var hasDetail = !!(n.as_is_ko || n.to_be_ko);
    g.setAttribute("class", "node st-" + n.status
      + ((r.pipeline.focus || []).indexOf(n.id) >= 0 ? " focus" : "")
      + (hasDetail ? " clickable" : ""));
    var rect = document.createElementNS(svgNS, "rect");
    rect.setAttribute("x", p.x); rect.setAttribute("y", p.y);
    rect.setAttribute("width", NW); rect.setAttribute("height", NH);
    rect.setAttribute("rx", 8);
    g.appendChild(rect);
    var label = document.createElementNS(svgNS, "text");
    label.setAttribute("x", p.x + NW / 2);
    label.setAttribute("y", p.y + NH / 2 + 4);
    label.setAttribute("text-anchor", "middle");
    label.textContent = n.label;
    g.appendChild(label);
    if (hasDetail) {
      rect.addEventListener("click", function () {
        document.getElementById("nd-title").textContent = n.label
          + " (" + (n.status === "modified" ? "수정" : n.status === "added" ? "신규" : n.status === "removed" ? "삭제" : "변경 없음") + ")";
        document.getElementById("nd-asis").textContent = n.as_is_ko || "—";
        document.getElementById("nd-tobe").textContent = n.to_be_ko || "—";
        document.getElementById("nd-paths").textContent = (n.paths || []).join("  ·  ");
        detail.classList.add("visible");
        detail.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });
    }
    svg.appendChild(g);
  });

  // 변경된 focus 노드가 있으면 첫 번째를 자동 표시
  var firstFocus = (r.pipeline.focus || []).map(function (id) { return byId[id]; })
    .filter(function (n) { return n && (n.as_is_ko || n.to_be_ko); })[0];
  if (firstFocus) {
    document.getElementById("nd-title").textContent = firstFocus.label;
    document.getElementById("nd-asis").textContent = firstFocus.as_is_ko || "—";
    document.getElementById("nd-tobe").textContent = firstFocus.to_be_ko || "—";
    document.getElementById("nd-paths").textContent = (firstFocus.paths || []).join("  ·  ");
    detail.classList.add("visible");
  }

  // ---------- why ----------
  document.getElementById("motivation").textContent = r.motivation_ko;
  var ul = document.getElementById("effects-list");
  r.expected_effects_ko.forEach(function (t) {
    var li = document.createElement("li");
    li.textContent = t;
    ul.appendChild(li);
  });

  // ---------- changes (rank 순) ----------
  var list = document.getElementById("changes-list");
  r.changes.slice().sort(function (a, b) { return a.rank - b.rank; }).forEach(function (c) {
    var card = document.createElement("div");
    card.className = "card change-card";

    var head = document.createElement("div");
    head.className = "change-head";
    var badge = document.createElement("span");
    badge.className = "badge " + c.importance;
    badge.textContent = c.importance;
    head.appendChild(badge);
    var sym = document.createElement("span");
    sym.className = "symbol";
    sym.textContent = c.module + " :: " + c.symbol;
    head.appendChild(sym);
    var file = document.createElement("span");
    file.className = "file";
    file.textContent = c.file;
    head.appendChild(file);
    card.appendChild(head);

    var expl = document.createElement("p");
    expl.className = "expl";
    expl.textContent = c.explanation_ko;
    card.appendChild(expl);

    if (c.risk_notes_ko) {
      var risk = document.createElement("div");
      risk.className = "risk";
      risk.textContent = c.risk_notes_ko;
      card.appendChild(risk);
    }

    if (c.diff_snippet) {
      var det = document.createElement("details");
      det.className = "diff-box";
      var sum = document.createElement("summary");
      sum.textContent = "diff 보기";
      det.appendChild(sum);
      var pre = document.createElement("pre");
      pre.className = "diff";
      c.diff_snippet.split("\n").forEach(function (line) {
        var span = document.createElement("span");
        var cls = "ln";
        if (line.indexOf("@@") === 0) cls += " hunk";
        else if (line.indexOf("+") === 0 && line.indexOf("+++") !== 0) cls += " add";
        else if (line.indexOf("-") === 0 && line.indexOf("---") !== 0) cls += " del";
        span.className = cls;
        span.textContent = line.length ? line : " ";
        pre.appendChild(span);
      });
      det.appendChild(pre);
      card.appendChild(det);
    }
    list.appendChild(card);
  });

  // ---------- qa / footer ----------
  document.getElementById("qa-note").textContent = r.qa_note_ko;
  document.getElementById("page-footer").textContent =
    "이 리포트는 pr-report 워크플로우가 자동 생성했습니다. 최신 상태가 아니면 PR에 /claude-report 코멘트로 재생성할 수 있습니다.";
})();
</script>
</body>
</html>
