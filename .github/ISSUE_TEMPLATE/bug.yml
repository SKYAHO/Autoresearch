name: Bug
description: 버그, 오류, 기대와 다른 동작을 보고합니다.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그는 재현 가능한 정보가 가장 중요합니다. 가능하면 같은 절차로 다시 발생시킬 수 있게 작성해 주세요.

  - type: textarea
    id: summary
    attributes:
      label: 현상
      description: 어떤 문제가 발생했는지 간략히 설명해 주세요.
      placeholder: 예) 입력값이 비어 있을 때 학습 파이프라인이 종료됩니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 문제를 다시 확인할 수 있는 절차를 순서대로 적어 주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했다면 어떤 결과가 나와야 하나요?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 관찰한 결과를 적어 주세요.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 영향받는 컴포넌트
      multiple: true
      options:
        - Feature Store
        - Training
        - Serving
        - Reporting
        - 공통 인프라 / CI-CD
        - 문서 / 운영
        - 기타
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 실행 환경
      description: 브랜치, 실행 단계, Python 버전, 주요 의존성 버전을 적어 주세요.
      value: |
        - Branch:
        - Command:
        - Python:
        - Dependency:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 로그
      description: 에러 메시지나 관련 로그를 붙여 주세요.
      render: shell
    validations:
      required: false
