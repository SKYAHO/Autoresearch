name: Bug
description: 버그 수정 작업을 PAAR 형식으로 정리합니다.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그 수정은 PAAR 형식으로 정리합니다.

        - Problem: 어떤 문제가 발생했는가
        - Analysis: 원인과 영향 범위는 무엇인가
        - Action: 어떻게 수정할 것인가
        - Result: 수정 후 무엇으로 검증할 것인가

  - type: textarea
    id: problem
    attributes:
      label: P - Problem
      description: 발생한 문제, 영향받는 사용자/흐름, 재현 절차를 적어 주세요.
      placeholder: |
        ## 현상
        예) 입력값이 비어 있을 때 학습 파이프라인이 종료됩니다.

        ## 영향
        예) 빈 데이터셋을 처리하는 학습 job이 실패합니다.

        ## 재현 방법
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: analysis
    attributes:
      label: A - Analysis
      description: 확인한 원인, 의심 지점, 관련 코드/로그/데이터 조건을 적어 주세요.
      placeholder: |
        ## 원인 또는 의심 지점
        예) 입력 validation 없이 첫 row를 참조합니다.

        ## 근거
        예) stack trace, 실패 테스트, 관련 로그, 문제 commit/PR.

        ## 영향 범위
        예) Training pipeline의 empty input 처리에 한정됩니다.
    validations:
      required: true

  - type: textarea
    id: action
    attributes:
      label: A - Action
      description: 수정 방향과 작업 체크리스트를 적어 주세요.
      placeholder: |
        - [ ] 실패를 재현하는 테스트를 추가한다
        - [ ] 원인 코드를 수정한다
        - [ ] 관련 문서 또는 에러 메시지를 필요한 만큼 갱신한다
    validations:
      required: true

  - type: textarea
    id: result
    attributes:
      label: R - Result
      description: 수정 후 기대 결과와 검증 명령을 적어 주세요.
      placeholder: |
        ## 기대 결과
        예) 빈 입력이면 명확한 validation error를 반환하고 pipeline이 예측 가능한 상태로 종료됩니다.

        ## 검증
        예) pytest tests/test_training_empty_input.py -v
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 영향받는 컴포넌트
      multiple: true
      options:
        - Feature Store
        - Training
        - Serving
        - Reporting
        - 공통 인프라 / CI-CD
        - 문서 / 운영
        - 기타
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 실행 환경
      description: 브랜치, 실행 단계, Python 버전, 주요 의존성 버전을 적어 주세요.
      value: |
        - Branch:
        - Command:
        - Python:
        - Dependency:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 로그
      description: 에러 메시지나 관련 로그를 붙여 주세요.
      render: shell
    validations:
      required: false
