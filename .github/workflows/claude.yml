name: Claude Code PR Review

on:
  pull_request:
    types: [opened, ready_for_review]
  workflow_dispatch:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request' && !github.event.pull_request.draft) ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/claude-review')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude PR review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "/claude-review"
          prompt: |
            You are an expert code reviewer conducting a thorough review of a pull request.

            Repository: ${{ github.repository }}
            Pull request number: ${{ github.event.pull_request.number || github.event.issue.number }}

            Provide constructive feedback on code quality, potential bugs, and improvements.

            Understanding check:
            - Add 1-3 inline review comments that ask concrete understanding-check questions about the core logic implemented in this PR.
            - Each question must be attached to the most relevant changed line in the diff. Do not put understanding-check questions only in the final summary.
            - Ask only about logic the author must understand to safely own, maintain, or operate this change.
            - Good question targets include behavior changes, edge cases, failure modes, state transitions, data contracts, rollout/rollback impact, and operational assumptions.
            - Do not ask generic best-practice trivia. Questions must be grounded in the actual PR diff.
            - Do not include the answer in the comment.
            - If the PR is trivial, docs-only, formatting-only, or mechanically obvious, do not add understanding-check comments.
            - Prefix each understanding-check inline comment with "이해도 확인:".
            - The author is expected to answer in the same inline thread, validate the answer with a local agent if needed, and then resolve the thread.

            At the end of your summary comment, include this line so readers can find the auto-generated comprehension report (stage 1-2 of the PR understanding system):
            "이 PR의 파이프라인 시각화·중요도순 변경 분석은 PR 이해 리포트를 참고하십시오: https://skyaho.github.io/Autoresearch/pr/${{ github.event.pull_request.number || github.event.issue.number }}/"
          claude_args: |
            --model "claude-opus-4-8"
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
