name: Lint

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install Ruff
        # ruff 버전은 pyproject.toml 의 lint 그룹이 단일 출처.
        run: uv sync --frozen --only-group lint

      - name: Run Ruff
        run: uv run --no-sync ruff check autoresearch tests
