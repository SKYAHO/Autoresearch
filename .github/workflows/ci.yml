name: Python CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          # uv 버전을 고정해 lock/export 포맷이 로컬과 어긋나지 않게 한다.
          version: "0.11.26"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run --no-sync python -m pytest

  pytest-feast:
    name: pytest (feast group)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.26"
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        # feast 그룹은 dev 그룹과 충돌하므로 --no-dev 로 격리 설치한다.
        run: uv sync --frozen --no-dev --group feast

      - name: Run feast pytest
        run: uv run --no-sync python -m pytest tests/test_redis_iam.py tests/test_feast_materialize.py -v

  uv-lock-check:
    name: uv lock & proxy export drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.26"

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check

      - name: Verify MLflow runtime uv.lock matches pyproject.toml
        # deploy/mlflow/runtime은 루트 프로젝트와 분리된 독립 manifest/lockfile이라
        # 루트 uv lock --check로는 drift가 잡히지 않는다.
        run: cd deploy/mlflow/runtime && uv lock --check

      - name: Verify exported proxy/requirements.txt matches uv.lock
        # proxy/requirements.txt(Cloud Run, 깨끗한 python-slim 베이스)는
        # uv.lock 에서 생성되는 전핀 산출물이다. 재생성 후 diff 로 drift 를 검사한다.
        run: |
          uv export --frozen --only-group proxy --no-hashes -o proxy/requirements.txt
          git diff --exit-code proxy/requirements.txt

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        # uv.lock 기반 canonical application image만 검증한다.
        run: |
          docker build \
            --build-arg VCS_REF="${{ github.sha }}" \
            -f Dockerfile.app \
            --tag autoresearch:ci \
            .

      - name: Run Docker image smoke check
        run: |
          docker run --rm autoresearch:ci
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.youtube_trending --help
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.youtube_trending --version
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.youtube_backfill --help
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.youtube_backfill --version
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.action_log --help
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.action_log --version
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.action_log_quality --help
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.action_log_quality --version

      - name: Build training image
        # CTR 학습 파이프라인(src/)을 담는 이미지. Dockerfile.app과 별도로
        # 관리한다 — 배치 CLI(autoresearch/)와 학습 코드(src/)는 책임이 다르다.
        run: |
          docker build \
            --build-arg VCS_REF="${{ github.sha }}" \
            -f Dockerfile.train \
            --tag autoresearch-training:ci \
            .

      - name: Run training image smoke check
        run: |
          docker run --rm autoresearch-training:ci
          docker run --rm autoresearch-training:ci \
            python -m src.cli build-features --help
          docker run --rm autoresearch-training:ci \
            python -m src.cli train-model --help
          docker run --rm autoresearch-training:ci \
            python -m src.cli evaluate-model --help
          docker run --rm autoresearch-training:ci \
            python -m src.cli run-pipeline --help

      - name: Build MLflow runtime image
        # deploy/mlflow/runtime의 uv.lock 기반 최소 파생 이미지를 검증한다.
        # Dockerfile 안의 psycopg2/boto3/google-cloud-storage import 스모크 체크가
        # 이 빌드를 통해서만 실행된다.
        run: |
          docker build \
            -f deploy/mlflow/Dockerfile \
            --tag mlflow-runtime:ci \
            .

      - name: Build Feast Docker image
        # feast 그룹 파생 이미지 (materialize 실행·GKE 검증용)
        run: |
          docker build \
            --build-arg VCS_REF="${{ github.sha }}" \
            -f Dockerfile.feast \
            --tag autoresearch-feast:ci \
            .

      - name: Run Feast Docker image smoke check
        # 코드가 이미지에 없으므로 로컬 아카이브 주입 모드로 부트스트랩
        # 압축 해제·실행 경로를 검증한다.
        run: |
          git archive --format=tar.gz -o /tmp/code-archive.tar.gz HEAD
          run_feast() {
            docker run --rm \
              -v /tmp/code-archive.tar.gz:/tmp/code-archive.tar.gz:ro \
              -e CODE_ARCHIVE_LOCAL_PATH=/tmp/code-archive.tar.gz \
              autoresearch-feast:ci "$@"
          }
          run_feast
          run_feast python -m autoresearch.jobs.feast_materialize --help
          run_feast python -m autoresearch.jobs.feast_materialize --version
          if docker run --rm autoresearch-feast:ci 2>/dev/null; then
            echo "::error::부트스트랩이 env 없이 성공해서는 안 된다"
            exit 1
          fi
