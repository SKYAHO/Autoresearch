name: Python CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run --no-sync python -m pytest

  uv-lock-check:
    name: uv lock & export drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check

      - name: Verify exported requirements files match uv.lock
        # requirements.txt(Astro/CI 이미지)와 proxy/requirements.txt(Cloud Run)는
        # uv.lock 에서 생성되는 산출물이다. 재생성 후 diff 로 drift 를 검사한다.
        run: |
          uv export --frozen --no-dev --no-hashes -o requirements.txt
          uv export --frozen --only-group proxy --no-hashes -o proxy/requirements.txt
          git diff --exit-code requirements.txt proxy/requirements.txt

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        # 루트 Dockerfile 은 Astro 런타임 이미지(astro dev/배포용)이다.
        # CI 의 빌드 검증은 가벼운 app 패키지 이미지(Dockerfile.app) 로 수행한다.
        run: docker build -f Dockerfile.app --tag autoresearch:ci .

      - name: Run Docker image smoke check
        run: docker run --rm autoresearch:ci
