name: Python CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          # uv 버전을 고정해 lock/export 포맷이 로컬과 어긋나지 않게 한다.
          version: "0.11.26"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run --no-sync python -m pytest

  uv-lock-check:
    name: uv lock & export drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.26"

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check

      - name: Verify requirements.txt mirrors pyproject dependencies
        # requirements.txt(Astro/CI 이미지)는 [project].dependencies 의 범위
        # 미러다 — astro-runtime 베이스가 이미 설치·제약한 의존성을 재사용하며,
        # lock 전핀 export 는 provider 제약을 깨뜨린다 (requirements.txt 헤더 참조).
        run: |
          python3 - <<'EOF'
          import tomllib

          deps = tomllib.load(open("pyproject.toml", "rb"))["project"]["dependencies"]
          reqs = [
              line.strip()
              for line in open("requirements.txt")
              if line.strip() and not line.startswith("#")
          ]
          assert reqs == deps, f"drift: {sorted(set(reqs) ^ set(deps))}"
          EOF

      - name: Verify exported proxy/requirements.txt matches uv.lock
        # proxy/requirements.txt(Cloud Run, 깨끗한 python-slim 베이스)는
        # uv.lock 에서 생성되는 전핀 산출물이다. 재생성 후 diff 로 drift 를 검사한다.
        run: |
          uv export --frozen --only-group proxy --no-hashes -o proxy/requirements.txt
          git diff --exit-code proxy/requirements.txt

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        # 루트 Dockerfile 은 Astro 런타임 이미지(astro dev/배포용)이다.
        # CI 의 빌드 검증은 가벼운 app 패키지 이미지(Dockerfile.app) 로 수행한다.
        run: |
          docker build \
            --build-arg VCS_REF="${{ github.sha }}" \
            -f Dockerfile.app \
            --tag autoresearch:ci \
            .

      - name: Run Docker image smoke check
        run: |
          docker run --rm autoresearch:ci
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.youtube_trending --help
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.youtube_trending --version
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.action_log --help
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.action_log --version
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.action_log_quality --help
          docker run --rm autoresearch:ci \
            python -m autoresearch.jobs.action_log_quality --version
