name: Python CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        # 루트 Dockerfile 은 Astro 런타임 이미지(astro dev/배포용)이다.
        # CI 의 빌드 검증은 가벼운 app 패키지 이미지(Dockerfile.app) 로 수행한다.
        run: docker build -f Dockerfile.app --tag autoresearch:ci .

      - name: Run Docker image smoke check
        run: docker run --rm autoresearch:ci
