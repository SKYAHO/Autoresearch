name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Print release info
        run: |
          echo "Tag: ${{ github.event.release.tag_name }}"
          echo "Name: ${{ github.event.release.name }}"
          echo "Target: ${{ github.event.release.target_commitish }}"
          echo "URL: ${{ github.event.release.html_url }}"

      - name: Generate App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: SKYAHO
          repositories: Autoresearch-airflow

      - name: Trigger build in Autoresearch-airflow
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/SKYAHO/Autoresearch-airflow/dispatches \
            -d "{\"event_type\":\"autoresearch-released\",\"client_payload\":{\"ref\":\"$TAG\",\"tag\":\"$TAG\"}}")
          if [ "$RESPONSE_CODE" != "204" ]; then
            echo "::error::Failed to dispatch event (HTTP $RESPONSE_CODE)"
            exit 1
          fi
          echo "Dispatch sent successfully for tag $TAG"
