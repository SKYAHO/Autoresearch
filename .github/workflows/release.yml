name: Release application image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      source_sha:
        description: Full 40-character Autoresearch commit SHA to publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-application-image:
    name: Build, push, and verify application image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      digest_ref: ${{ steps.verify.outputs.digest_ref }}
      source_sha: ${{ steps.source.outputs.sha }}

    steps:
      - name: Resolve immutable source ref
        id: source-ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_SOURCE_SHA: ${{ inputs.source_sha }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ ! "$MANUAL_SOURCE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "::error::source_sha must be a full 40-character commit SHA"
              exit 1
            fi
            source_ref="${MANUAL_SOURCE_SHA,,}"
            release_image_tag=""
          else
            if [[ ! "$RELEASE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
              echo "::error::Release tag is not a valid Docker tag"
              exit 1
            fi
            source_ref="$RELEASE_TAG"
            release_image_tag="$RELEASE_TAG"
          fi

          echo "ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "release_image_tag=$release_image_tag" >> "$GITHUB_OUTPUT"

      - name: Checkout immutable source
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.source-ref.outputs.ref }}
          fetch-depth: 1

      - name: Record checked out source SHA
        id: source
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_SOURCE_SHA: ${{ inputs.source_sha }}
        shell: bash
        run: |
          source_sha="$(git rev-parse HEAD)"
          if [[ ! "$source_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Checkout did not resolve to a full commit SHA"
            exit 1
          fi
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]] \
            && [[ "$source_sha" != "${MANUAL_SOURCE_SHA,,}" ]]; then
            echo "::error::Checked out SHA does not match source_sha"
            exit 1
          fi

          echo "sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Validate release configuration
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
          WIF_PROVIDER_ID: ${{ vars.WIF_PROVIDER_ID }}
          GAR_PUSHER_SA: ${{ secrets.GAR_PUSHER_SA }}
        shell: bash
        run: |
          for variable_name in \
            GCP_PROJECT_ID GCP_REGION GAR_REPOSITORY \
            WIF_PROVIDER_ID GAR_PUSHER_SA
          do
            if [[ -z "${!variable_name}" ]]; then
              echo "::error::$variable_name is not configured"
              exit 1
            fi
          done

      - name: Resolve image references
        id: image
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
          RELEASE_IMAGE_TAG: ${{ steps.source-ref.outputs.release_image_tag }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        shell: bash
        run: |
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/autoresearch-batch"
          sha_ref="${image_uri}:sha-${SOURCE_SHA}"

          {
            echo "tags<<EOF"
            echo "$sha_ref"
            if [[ -n "$RELEASE_IMAGE_TAG" ]]; then
              echo "${image_uri}:${RELEASE_IMAGE_TAG}"
            fi
            echo "EOF"
            echo "uri=$image_uri"
            echo "sha_ref=$sha_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP with Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_ID }}
          service_account: ${{ secrets.GAR_PUSHER_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        env:
          GCP_REGION: ${{ vars.GCP_REGION }}
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push application image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.app
          push: true
          build-args: |
            VCS_REF=${{ steps.source.outputs.sha }}
          tags: ${{ steps.image.outputs.tags }}

      - name: Verify digest, metadata, and public CLI contract
        id: verify
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_URI: ${{ steps.image.outputs.uri }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        shell: bash
        run: |
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Build did not return a valid registry digest"
            exit 1
          fi

          digest_ref="${IMAGE_URI}@${DIGEST}"
          docker pull "$digest_ref"

          image_revision="$(docker image inspect "$digest_ref" \
            --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          if [[ "$image_revision" != "$SOURCE_SHA" ]]; then
            echo "::error::OCI revision does not match checked out source SHA"
            exit 1
          fi

          image_user="$(docker image inspect "$digest_ref" --format '{{ .Config.User }}')"
          if [[ -z "$image_user" || "$image_user" == "0" || "$image_user" == "root" ]]; then
            echo "::error::Application image must run as a non-root user"
            exit 1
          fi

          docker run --rm "$digest_ref"
          for module in \
            autoresearch.jobs.youtube_trending \
            autoresearch.jobs.youtube_backfill \
            autoresearch.jobs.action_log \
            autoresearch.jobs.action_log_quality
          do
            docker run --rm "$digest_ref" python -m "$module" --help >/dev/null
            version_json="$(docker run --rm "$digest_ref" python -m "$module" --version)"
            cli_revision="$(jq -er '.application_revision' <<< "$version_json")"
            contract_version="$(jq -er '.contract_version' <<< "$version_json")"
            if [[ "$cli_revision" != "$SOURCE_SHA" ]]; then
              echo "::error::$module reports a different application revision"
              exit 1
            fi
            if [[ "$contract_version" != "batch-contract-v1" ]]; then
              echo "::error::$module reports an unexpected batch contract"
              exit 1
            fi
          done

          echo "digest_ref=$digest_ref" >> "$GITHUB_OUTPUT"

      - name: Write release summary
        env:
          DIGEST_REF: ${{ steps.verify.outputs.digest_ref }}
          RELEASE_IMAGE_TAG: ${{ steps.source-ref.outputs.release_image_tag }}
          SHA_REF: ${{ steps.image.outputs.sha_ref }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        shell: bash
        run: |
          {
            echo "## Autoresearch application image"
            echo
            echo "- Source SHA: \`$SOURCE_SHA\`"
            echo "- Immutable tag: \`$SHA_REF\`"
            if [[ -n "$RELEASE_IMAGE_TAG" ]]; then
              echo "- Release tag: \`$RELEASE_IMAGE_TAG\`"
            fi
            echo "- Deployable digest: \`$DIGEST_REF\`"
            echo
            echo "Existing registry digests are retained as rollback candidates."
          } >> "$GITHUB_STEP_SUMMARY"
